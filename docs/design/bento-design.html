<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LifeOS v3 · Bento Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;750;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
 --bg:#eef1f7;--card:#ffffff;--soft:#f3f5fa;--text:#1f2430;--mut:#6b7385;--faint:#9aa2b4;
 --line:#eceff5;--line2:#e1e5ee;--acc:#6c5ce7;--acc2:#a29bfe;--on:#fff;
 --g:#00b894;--r:#e74c6b;--y:#f0932b;--b:#0984e3;--o:#e17055;
 --scroll:#d3d8e3;--shadow:0 1px 2px rgba(31,36,48,.04),0 8px 24px rgba(31,36,48,.06);
 --shadow2:0 2px 4px rgba(31,36,48,.05),0 16px 40px rgba(31,36,48,.09);--rad:18px;--rad2:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}

/* sidebar */
.side{background:linear-gradient(180deg,#fbfcff,#f3f5fa);border-right:1px solid var(--line2);display:flex;flex-direction:column;padding:18px 14px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
.logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;box-shadow:0 6px 16px rgba(108,92,231,.35)}
.brand b{font-size:16px;font-weight:700;letter-spacing:-.2px}.brand small{display:block;color:var(--faint);font-size:11px;font-weight:500}
.navgrp{margin-top:14px}.navgrp h6{color:var(--faint);font-size:10.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:0 10px 7px}
.nav{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;color:var(--mut);font-weight:500;font-size:13.5px;transition:.15s;width:100%;text-align:left;margin-bottom:1px}
.nav svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.9;fill:none;flex:0 0 auto}
.nav:hover{background:#fff;color:var(--text);box-shadow:var(--shadow)}
.nav.on{background:var(--acc);color:#fff;box-shadow:0 8px 20px rgba(108,92,231,.32)}
.nav .pill{margin-left:auto;background:var(--soft);color:var(--mut);font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px}
.nav.on .pill{background:rgba(255,255,255,.22);color:#fff}
.side-foot{margin-top:auto;padding-top:14px}
.usr{display:flex;align-items:center;gap:10px;padding:9px;border-radius:12px;background:#fff;box-shadow:var(--shadow)}
.ava{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--g),#55efc4);display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}
.usr b{font-size:13px}.usr small{color:var(--faint);font-size:11px}

/* main */
.main{overflow-y:auto;padding:0 30px 40px}
.top{position:sticky;top:0;z-index:10;background:rgba(238,241,247,.82);backdrop-filter:blur(12px);display:flex;align-items:center;gap:14px;padding:18px 0 14px;margin-bottom:6px}
.search{flex:1;max-width:440px;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line2);border-radius:12px;padding:9px 13px;color:var(--faint);box-shadow:var(--shadow)}
.search svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none}
.search .k{margin-left:auto;font-size:11px;font-weight:600;background:var(--soft);padding:2px 7px;border-radius:6px;color:var(--mut)}
.tbtn{width:40px;height:40px;border-radius:11px;background:#fff;border:1px solid var(--line2);display:grid;place-items:center;color:var(--mut);box-shadow:var(--shadow);transition:.15s}
.tbtn:hover{color:var(--text);box-shadow:var(--shadow2)}.tbtn svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.9;fill:none}

.phead{display:flex;align-items:flex-end;gap:14px;margin:8px 0 20px}
.phead h1{font-size:25px;font-weight:750;letter-spacing:-.6px}
.phead p{color:var(--faint);font-size:13px;margin-top:3px}
.phead .acts{margin-left:auto;display:flex;gap:9px}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--acc);color:#fff;font-weight:600;font-size:13px;padding:10px 15px;border-radius:11px;box-shadow:0 8px 18px rgba(108,92,231,.28);transition:.15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(108,92,231,.36)}
.btn.ghost{background:#fff;color:var(--text);border:1px solid var(--line2);box-shadow:var(--shadow)}
.btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.1;fill:none}

/* metrics */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
.metric{background:var(--card);border-radius:var(--rad);padding:16px 17px;box-shadow:var(--shadow);transition:.18s}
.metric:hover{box-shadow:var(--shadow2);transform:translateY(-2px)}
.metric .l{color:var(--faint);font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
.metric .l i{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-style:normal;font-size:14px}
.metric .v{font-size:25px;font-weight:750;letter-spacing:-.8px;margin:9px 0 2px}.metric .v small{font-size:14px;color:var(--faint);font-weight:600}
.metric .d{font-size:11.5px;font-weight:600}.up{color:var(--g)}.down{color:var(--r)}.flat{color:var(--faint)}

/* bento grid */
.bento{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card{background:var(--card);border-radius:var(--rad);box-shadow:var(--shadow);padding:18px;transition:.18s;display:flex;flex-direction:column}
.card:hover{box-shadow:var(--shadow2)}
.c2{grid-column:span 2}.c3{grid-column:span 3}.c4{grid-column:span 4}
.ch{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ch h3{font-size:14.5px;font-weight:700;letter-spacing:-.2px}
.ch .cnt{color:var(--faint);font-size:12px;font-weight:600}
.ch .mini{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--acc);background:var(--soft);padding:5px 10px;border-radius:9px;transition:.15s}
.ch .mini:hover{background:#ece9ff}.ch .mini svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.4;fill:none}

/* rows */
.row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.cbx{width:19px;height:19px;border-radius:7px;border:2px solid var(--line2);flex:0 0 auto;transition:.15s;display:grid;place-items:center}
.cbx.dn{background:var(--g);border-color:var(--g)}.cbx.dn::after{content:'';width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.row .t{flex:1;font-size:13.5px;font-weight:500}.row.dn .t{color:var(--faint);text-decoration:line-through}
.tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--soft);color:var(--mut)}
.pr{width:8px;height:8px;border-radius:50%}.pr.high{background:var(--r)}.pr.med{background:var(--y)}.pr.low{background:var(--g)}
.tm{color:var(--faint);font-size:11.5px;font-weight:600;min-width:38px;text-align:right}

/* accounts/finance */
.acc-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}.acc-row:last-child{border-bottom:none}
.dot{width:10px;height:10px;border-radius:50%}
.acc-row .nm{font-weight:600;font-size:13.5px}.acc-row .bal{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}
.bars{display:flex;flex-direction:column;gap:13px;margin-top:2px}
.bar .bl{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;margin-bottom:6px}.bar .bl span:last-child{color:var(--faint)}
.track{height:9px;background:var(--soft);border-radius:8px;overflow:hidden}.fill{height:100%;border-radius:8px}

/* events / calendar */
.evt{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid var(--line)}.evt:last-child{border-bottom:none}
.evt .when{font-weight:700;font-size:13px;color:var(--acc);min-width:46px}
.evt .ti{font-weight:600;font-size:13.5px}.evt .de{color:var(--faint);font-size:12px;margin-top:2px}
.evt .badge{margin-left:auto;align-self:flex-start;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.b-met{background:#ece9ff;color:var(--acc)}.b-foc{background:#e0f7f1;color:var(--g)}.b-hea{background:#ffeede;color:var(--o)}

/* habits */
.habit{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}.habit:last-child{border-bottom:none}
.hico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px}
.habit .hn{font-weight:600;font-size:13.5px}.habit .hs{color:var(--faint);font-size:11.5px}
.streak{margin-left:auto;display:flex;gap:4px}.sq{width:13px;height:13px;border-radius:4px;background:var(--soft)}.sq.on{background:var(--g)}

/* notes */
.note{background:var(--soft);border-radius:var(--rad2);padding:14px;border:1px solid var(--line2)}
.note h4{font-size:13.5px;font-weight:700;margin-bottom:6px}.note p{color:var(--mut);font-size:12.5px;line-height:1.55}
.note .up{color:var(--faint);font-size:11px;margin-top:9px;font-weight:600}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* mini calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal .dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--faint);padding-bottom:4px}
.cal .day{aspect-ratio:1;border-radius:10px;display:grid;place-items:center;font-size:12.5px;font-weight:600;color:var(--mut);position:relative;transition:.12s}
.cal .day:hover{background:var(--soft)}.cal .day.dim{color:var(--faint);opacity:.45}
.cal .day.now{background:var(--acc);color:#fff;box-shadow:0 6px 14px rgba(108,92,231,.3)}
.cal .day.has::after{content:'';position:absolute;bottom:5px;width:4px;height:4px;border-radius:50%;background:var(--g)}
.cal .day.now.has::after{background:#fff}

/* ring */
.ring-wrap{display:flex;align-items:center;gap:18px}
.ring{width:104px;height:104px;flex:0 0 auto}
.ring .bg{stroke:var(--soft)}.ring .fg{stroke:var(--acc);stroke-linecap:round;transition:1s}
.ring-c{position:relative}.ring-c .ctr{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column;text-align:center}
.ring-c .ctr b{font-size:22px;font-weight:750}.ring-c .ctr small{color:var(--faint);font-size:11px;display:block}
.legend{display:flex;flex-direction:column;gap:9px}.legend div{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600}
.legend .d{width:10px;height:10px;border-radius:3px}

/* health stats */
.hstat{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hbox{background:var(--soft);border-radius:var(--rad2);padding:14px;border:1px solid var(--line2)}
.hbox .hl{color:var(--faint);font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.hbox .hv{font-size:22px;font-weight:750;margin-top:6px;letter-spacing:-.5px}.hbox .hv small{font-size:12px;color:var(--faint);font-weight:600}

/* settings */
.setrow{display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px solid var(--line)}.setrow:last-child{border-bottom:none}
.setrow .si{width:38px;height:38px;border-radius:11px;background:var(--soft);display:grid;place-items:center}.setrow .si svg{width:18px;height:18px;stroke:var(--acc);stroke-width:1.9;fill:none}
.setrow b{font-size:13.5px}.setrow small{color:var(--faint);font-size:12px;display:block}
.toggle{margin-left:auto;width:42px;height:24px;border-radius:20px;background:var(--line2);position:relative;transition:.2s;flex:0 0 auto}
.toggle.on{background:var(--acc)}.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:20px}

/* palette */
.pal-bg{position:fixed;inset:0;background:rgba(31,36,48,.4);backdrop-filter:blur(4px);z-index:100;display:grid;place-items:start center;padding-top:14vh}
.pal{width:540px;max-width:90vw;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
.pal input{width:100%;border:none;outline:none;padding:18px 20px;font-size:16px;border-bottom:1px solid var(--line2)}
.pal .opt{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;font-size:14px;font-weight:500}.pal .opt:hover,.pal .opt.sel{background:var(--soft)}
.pal .opt svg{width:17px;height:17px;stroke:var(--mut);stroke-width:1.9;fill:none}.pal .opt .h{margin-left:auto;color:var(--faint);font-size:11px}
@media(max-width:1200px){.bento{grid-template-columns:repeat(2,1fr)}.c3,.c4{grid-column:span 2}.metrics{grid-template-columns:repeat(3,1fr)}}

/* segmented / tabs */
.seg{display:inline-flex;background:var(--soft);border-radius:11px;padding:3px;gap:2px}
.seg button{padding:7px 14px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--mut);transition:.15s}
.seg button.on{background:#fff;color:var(--text);box-shadow:var(--shadow)}
.subnav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:7px 13px;border-radius:10px;background:#fff;border:1px solid var(--line2);font-size:12.5px;font-weight:600;color:var(--mut);box-shadow:var(--shadow);transition:.15s;display:inline-flex;align-items:center;gap:7px}
.chip:hover{color:var(--text)}.chip.on{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 6px 14px rgba(108,92,231,.28)}
.chip .n{background:rgba(0,0,0,.06);padding:0 6px;border-radius:10px;font-size:11px}.chip.on .n{background:rgba(255,255,255,.22)}

/* forms */
.fld{margin-bottom:12px}.fld label{display:block;font-size:11.5px;font-weight:600;color:var(--mut);margin-bottom:5px}
.fld input,.fld textarea,.fld select{width:100%;background:var(--soft);border:1px solid var(--line2);border-radius:10px;padding:9px 12px;font-size:13.5px;color:var(--text);outline:none;font-family:inherit;transition:.15s}
.fld input:focus,.fld textarea:focus,.fld select:focus{border-color:var(--acc);background:#fff;box-shadow:0 0 0 3px rgba(108,92,231,.12)}
.fld textarea{resize:vertical;min-height:64px;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* two-pane */
.split{display:grid;grid-template-columns:300px 1fr;gap:14px;align-items:start}
.list-pane{background:var(--card);border-radius:var(--rad);box-shadow:var(--shadow);padding:10px;max-height:calc(100vh - 200px);overflow-y:auto}
.li{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;cursor:pointer;transition:.13s;margin-bottom:2px}
.li:hover{background:var(--soft)}.li.on{background:#ece9ff}
.li .av{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex:0 0 auto}
.li b{font-size:13.5px;font-weight:600;display:block}.li small{color:var(--faint);font-size:11.5px}
.li .meta{margin-left:auto;text-align:right}

/* detail */
.detail{background:var(--card);border-radius:var(--rad);box-shadow:var(--shadow);padding:22px}
.detail h2{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.detail .sub{color:var(--faint);font-size:12.5px;margin-bottom:18px}
.empty{display:grid;place-items:center;min-height:300px;color:var(--faint);font-size:13.5px;text-align:center}
.empty svg{width:40px;height:40px;stroke:var(--line2);stroke-width:1.6;fill:none;margin-bottom:12px}

/* trans/table */
.tx{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}.tx:last-child{border-bottom:none}
.tx .ti{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}
.tx .ti.inc{background:#e0f7f1;color:var(--g)}.tx .ti.exp{background:#fde8ee;color:var(--r)}
.tx .amt{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}.amt.inc{color:var(--g)}.amt.exp{color:var(--r)}

/* notes editor */
.editor{display:grid;grid-template-columns:240px 1fr 1fr;gap:14px;align-items:start}
.tree{background:var(--card);border-radius:var(--rad);box-shadow:var(--shadow);padding:10px;max-height:calc(100vh - 200px);overflow:auto}
.tnode{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;font-size:13px;cursor:pointer;color:var(--mut)}
.tnode:hover{background:var(--soft)}.tnode.on{background:#ece9ff;color:var(--text);font-weight:600}
.tnode svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;flex:0 0 auto}
.md-edit{background:var(--card);border-radius:var(--rad);box-shadow:var(--shadow);padding:0;overflow:hidden;display:flex;flex-direction:column}
.md-edit textarea{border:none;outline:none;resize:none;padding:18px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;line-height:1.7;min-height:380px;background:transparent;color:var(--text)}
.md-prev{background:var(--card);border-radius:var(--rad);box-shadow:var(--shadow);padding:22px;overflow:auto;max-height:calc(100vh - 200px)}
.md-prev h1{font-size:22px;margin:0 0 12px}.md-prev h2{font-size:17px;margin:18px 0 8px}.md-prev p{color:var(--mut);margin-bottom:10px;line-height:1.6;font-size:13.5px}
.md-prev ul{padding-left:20px;color:var(--mut);font-size:13.5px;line-height:1.7}
.md-prev .notes-wikilink{color:var(--acc);background:#ece9ff;border-radius:5px;padding:1px 6px;font-size:13px;font-weight:600}
.pane-h{padding:12px 16px;border-bottom:1px solid var(--line);font-size:11.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}

/* timer */
.timer-wrap{display:grid;place-items:center;padding:20px 0}
.timer{position:relative;width:240px;height:240px}
.timer .t-time{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column;text-align:center}
.timer .t-time b{font-size:46px;font-weight:750;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.timer .t-time small{color:var(--faint);font-size:13px}
.timer-acts{display:flex;gap:10px;justify-content:center;margin-top:6px}
.tbtn-big{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;background:#fff;border:1px solid var(--line2);box-shadow:var(--shadow);transition:.15s}
.tbtn-big:hover{box-shadow:var(--shadow2);transform:translateY(-2px)}.tbtn-big.pri{background:var(--acc);border-color:var(--acc);box-shadow:0 8px 18px rgba(108,92,231,.3)}
.tbtn-big svg{width:22px;height:22px;stroke:var(--text);stroke-width:2;fill:none}.tbtn-big.pri svg{stroke:#fff;fill:#fff}

/* rating dots */
.rate{display:flex;gap:5px}.rate .rd{width:22px;height:22px;border-radius:7px;background:var(--soft);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--faint);cursor:pointer;transition:.12s}
.rate .rd.on{background:var(--acc);color:#fff}
.mood{display:flex;gap:8px;font-size:22px}.mood span{cursor:pointer;opacity:.4;transition:.12s}.mood span.on{opacity:1;transform:scale(1.15)}

/* habit state buttons */
.hb-acts{display:flex;gap:6px;margin-left:auto}
.hsbtn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--soft);color:var(--mut);transition:.13s}
.hsbtn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.2;fill:none}
.hsbtn.done{background:var(--g);color:#fff}.hsbtn.skip{background:var(--faint);color:#fff}.hsbtn.part{background:var(--y);color:#fff}
.state-badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:auto}
.st-completed{background:#e0f7f1;color:var(--g)}.st-skipped{background:#eef0f5;color:var(--faint)}.st-partial{background:#fff3e0;color:var(--y)}.st-pending{background:#ece9ff;color:var(--acc)}

/* trading table */
.ttbl{width:100%;border-collapse:collapse;font-size:12.5px}

function shell(){

   let pill='';
   if(it.id==='tasks')pill='<span class="pill">'+ST.tasks.filter(t=>!t.dn&&t.date==='today').length+'</span>';
   if(it.id==='projects')pill='<span class="pill">'+ST.projects.length+'</span>';
   const b=el('button','nav'+(it.id===ST.active?' on':''),ic(it.i)+'<span>'+it.n+'</span>'+pill);
   b.onclick=()=>{ST.active=it.id;render();};
   g.appendChild(b);
  });
  side.appendChild(g);
 });
 side.appendChild(el('div','side-foot','<div class="usr"><div class="ava">АП</div><div><b>Алекс П.</b><small>Pro план</small></div></div>'));
 const main=el('main','main');
 const top=el('div','top');
 top.innerHTML='<div class="search">'+ic('search')+'<span>Поиск по всему...</span><span class="k">⌘K</span></div>'
  +'<button class="tbtn" id="theme">'+ic(ST.settings.dark?'sun':'moon')+'</button><button class="tbtn">'+ic('bell')+'</button>';
 main.appendChild(top);
 main.appendChild(PAGES[ST.active]());
 app.append(side,main);
 return app;
}
function phead(title,sub,actions){
 const h=el('div','phead','<div><h1>'+title+'</h1><p>'+sub+'</p></div>');
 const a=el('div','acts');(actions||[]).forEach(ac=>{const btn=el('button','btn'+(ac.primary?'':' ghost'),(ac.primary?ic('plus'):'')+ac.n);if(ac.fn)btn.onclick=ac.fn;a.appendChild(btn);});h.appendChild(a);return h;
}
function metric(l,ico,col,v,d,cls){return '<div class="metric"><div class="l"><i style="background:'+col+'22;color:'+col+'">'+ico+'</i>'+l+'</div><div class="v">'+v+'</div><div class="d '+cls+'">'+d+'</div></div>';}
function card(cls,head,body){const c=el('div','card '+cls);if(head){const ch=el('div','ch');if(typeof head==='string')ch.innerHTML=head;else ch.appendChild(head);c.appendChild(ch);}const b=el('div');b.style.flex='1';if(typeof body==='string')b.innerHTML=body;else b.appendChild(body);c.appendChild(b);return c;}
function chead(title,cnt,link,fn){const h=el('span',null,'<h3>'+title+'</h3>'+(cnt?'<span class="cnt">'+cnt+'</span>':''));const f=document.createDocumentFragment();f.appendChild(el('h3',null,title));if(cnt)f.appendChild(el('span','cnt',cnt));if(link){const b=el('button','mini',link+ic('arrow'));if(fn)b.onclick=fn;f.appendChild(b);}return f;}
function seg(opts,cur,fn){const s=el('div','seg');opts.forEach(o=>{const b=el('button',o[0]===cur?'on':'',o[1]);b.onclick=()=>fn(o[0]);s.appendChild(b);});return s;}
function chips(opts,cur,fn){const w=el('div','subnav');opts.forEach(o=>{const c=el('button','chip'+(o[0]===cur?' on':''),o[1]+(o[2]!=null?'<span class="n">'+o[2]+'</span>':''));c.onclick=()=>fn(o[0]);w.appendChild(c);});return w;}
function taskRow(t){const r=el('div','row'+(t.dn?' dn':''));r.innerHTML='<span class="cbx'+(t.dn?' dn':'')+'"></span><span class="pr '+t.pr+'"></span><span class="t">'+t.t+'</span><span class="tag">'+t.list+'</span>'+(t.tm?'<span class="tm">'+t.tm+'</span>':'');r.querySelector('.cbx').onclick=()=>{t.dn=!t.dn;render();};return r;}
function addTask(){const t=prompt('Новая задача:');if(t)ST.tasks.unshift({id:uid(),t,pr:'med',list:'Входящие',date:ST.taskList==='today'?'today':'inbox',tm:'',dn:false});render();}

/* ===== NOTES (Obsidian-стиль) ===== */
function mdRender(t){return t.split('\n').map(l=>{
  l=l.replace(/\[\[([^\]]+)\]\]/g,'<span class="notes-wikilink">$1</span>');
  if(l.startsWith('## '))return '<h2>'+l.slice(3)+'</h2>';
  if(l.startsWith('# '))return '<h1>'+l.slice(2)+'</h1>';
  if(l.startsWith('- '))return '<li>'+l.slice(2)+'</li>';
  if(!l.trim())return '';return '<p>'+l+'</p>';
 }).join('').replace(/(<li>.*?<\/li>)+/g,'<ul>$&</ul>');}

 const ed=el('div','editor');

};

/* ===== PALETTE + RENDER ===== */
function palette(){
 const bg=el('div','pal-bg');const pal=el('div','pal');pal.innerHTML='<input placeholder="Команда или переход..." autofocus/>';
 NAV.flatMap(g=>g.items).forEach((it,i)=>{const o=el('div','opt'+(i===0?' sel':''),ic(it.i)+'<span>Перейти: '+it.n+'</span><span class="h">↵</span>');o.onclick=()=>{ST.active=it.id;bg.remove();render();};pal.appendChild(o);});
 bg.appendChild(pal);bg.onclick=e=>{if(e.target===bg)bg.remove();};document.body.appendChild(bg);pal.querySelector('input').focus();
}
function render(){if(ST.settings.dark)document.documentElement.classList.add('dark');document.body.innerHTML='';document.body.appendChild(shell());const t=$('#theme');if(t)t.onclick=()=>{ST.settings.dark=!ST.settings.dark;document.documentElement.classList.toggle('dark',ST.settings.dark);render();};}
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();palette();}if(e.key==='Escape'){const p=$('.pal-bg');if(p)p.remove();}});
render();
